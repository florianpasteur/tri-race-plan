<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tri Race Plan — Calculator</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TNH4W12CT5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());
        gtag('config', 'G-TNH4W12CT5');
    </script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --swim: #0ea5e9;
            --swim-light: #e0f2fe;
            --bike: #f59e0b;
            --bike-light: #fef3c7;
            --run: #22c55e;
            --run-light: #dcfce7;
            --t: #8b5cf6;
            --t-light: #ede9fe;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --r: 14px;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #fff;
            padding: 2.25rem 1rem 1.75rem;
            text-align: center;
        }

        header h1 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            margin-top: .35rem;
            color: #94a3b8;
            font-size: .9rem;
        }

        /* ── Layout ── */
        main {
            max-width: 1728px;
            margin: 0 auto;
            padding: 1.75rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ── Scenarios container ── */
        #scenarios-container {
            display: flex;
            flex-direction: column;
        }

        /* ── Scenario wrapper ── */
        .scenario {
            padding: 1.25rem 0;
        }

        .scenario + .scenario {
            border-top: 2px dashed var(--border);
        }

        /* Hide scenario header when only one scenario exists */
        #scenarios-container .scenario:only-child .scenario-header {
            display: none;
        }

        .scenario-header {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-bottom: .9rem;
        }

        .scenario-label {
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .09em;
            color: var(--muted);
        }

        .scenario-remove-btn {
            margin-left: auto;
            padding: .2rem .65rem;
            border: 1.5px solid var(--border);
            border-radius: 999px;
            background: #fff;
            font-family: inherit;
            font-size: .75rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, background .15s;
        }

        .scenario-remove-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: #fef2f2;
        }

        .duplicate-scenario-btn {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .55rem 1.4rem;
            margin: 1em;
            border: 2px dashed var(--border);
            border-radius: 999px;
            background: transparent;
            font-family: inherit;
            font-size: .875rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, background .15s, border-style .15s;
        }

        .duplicate-scenario-btn:hover {
            border-color: #3b82f6;
            border-style: solid;
            color: #3b82f6;
            background: #eff6ff;
        }

        /* ── Scenario cards grid ── */
        .scenario-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            align-items: start;
        }

        /* ── Add scenario button ── */
        .add-scenario-wrap {
            padding: 1.5rem 0 2.5rem;
            display: flex;
            justify-content: center;
        }

        .add-scenario-btn {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .55rem 1.4rem;
            border: 2px dashed var(--border);
            border-radius: 999px;
            margin: 1em;
            background: transparent;
            font-family: inherit;
            font-size: .875rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, background .15s, border-style .15s;
        }

        .add-scenario-btn:hover {
            border-color: #3b82f6;
            border-style: solid;
            color: #3b82f6;
            background: #eff6ff;
        }

        /* ── Card ── */
        .card {
            background: var(--card);
            border-radius: var(--r);
            border: 1px solid var(--border);
            overflow: hidden;
            height: 100%;
        }

        .card-header {
            padding: .9rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: #fafbfc;
            display: flex;
            align-items: center;
            gap: .75rem;
            flex-wrap: wrap;
        }

        .step {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--text);
            color: #fff;
            font-size: .72rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-size: .78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            flex: 1;
        }

        .card-body {
            padding: 1.25rem;
        }

        /* ── Preset buttons ── */
        .presets {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: .28rem .75rem;
            border: 1.5px solid var(--border);
            border-radius: 999px;
            background: #fff;
            font-size: .78rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, background .15s;
        }

        .preset-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #eff6ff;
        }

        .preset-btn.active {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #eff6ff;
        }

        /* ── Inputs & Selects ── */
        input, select {
            font-family: inherit;
            font-size: .95rem;
            color: var(--text);
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: .45rem .7rem;
            outline: none;
            width: 100%;
            transition: border-color .15s, box-shadow .15s;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
        }

        input::placeholder {
            color: #cbd5e1;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        /* ── Sport dot ── */
        .sport-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .swim-dot { background: var(--swim); }
        .bike-dot { background: var(--bike); }
        .run-dot  { background: var(--run);  }

        .sport-label {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-weight: 600;
            font-size: .9rem;
            white-space: nowrap;
        }

        /* ══ Section 1 — Distances ══ */
        .dist-grid {
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .dist-row {
            display: grid;
            grid-template-columns: 110px 1fr 130px;
            gap: .6rem;
            align-items: center;
        }

        /* ══ Section 2 — Pace ══ */
        .pace-grid {
            display: flex;
            flex-direction: column;
            gap: .85rem;
        }

        .pace-row {
            display: grid;
            grid-template-columns: 110px 1fr 28px 130px;
            gap: .6rem;
            align-items: center;
        }

        .pace-input-wrap {
            display: flex;
            align-items: stretch;
        }

        .pace-input-wrap input {
            flex: 1;
            min-width: 0;
            border-radius: 8px 0 0 8px;
            border-right: none;
        }

        .pace-input-wrap input:focus {
            z-index: 1;
            position: relative;
        }

        .pace-unit-badge {
            display: flex;
            align-items: center;
            padding: 0 .55rem;
            background: #f8fafc;
            border: 1.5px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            font-size: .75rem;
            font-weight: 500;
            color: var(--muted);
            white-space: nowrap;
        }

        .arrow-sep {
            text-align: center;
            color: #94a3b8;
            font-size: 1rem;
            user-select: none;
        }

        .pace-divider {
            border: none;
            border-top: 1px dashed var(--border);
            margin: .15rem 0;
        }

        .t-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: var(--t-light);
            color: var(--t);
            font-size: .7rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .transition-label {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-weight: 600;
            font-size: .9rem;
            grid-column: 1 / 4;
        }

        .field-hint {
            font-size: .72rem;
            color: var(--muted);
            margin-top: -.3rem;
            padding-left: 110px;
        }

        /* ══ Section 3 — Results ══ */
        .results-list {
            display: flex;
            flex-direction: column;
        }

        .result-item {
            display: grid;
            grid-template-columns: 110px 1fr 100px 22px;
            gap: .5rem;
            align-items: center;
            padding: .65rem 0;
            border-bottom: 1px solid var(--border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-size: .9rem;
            font-weight: 500;
        }

        .result-label.t-label {
            color: var(--t);
        }

        .result-bar-track {
            height: 7px;
            background: #f1f5f9;
            border-radius: 99px;
            overflow: hidden;
        }

        .result-bar {
            height: 100%;
            border-radius: 99px;
            transition: width .35s cubic-bezier(.4, 0, .2, 1);
        }

        .swim-bar { background: var(--swim); }
        .bike-bar { background: var(--bike); }
        .run-bar  { background: var(--run);  }
        .t-bar    { background: var(--t);    }

        .result-time {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            font-size: .95rem;
            text-align: right;
        }

        .result-time.muted {
            color: var(--muted);
            font-weight: 500;
        }

        .total-row {
            margin-top: 1.1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--text);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .total-label {
            font-size: .85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .total-time {
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -.03em;
        }

        /* ── Share / Reset buttons ── */
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .35rem .9rem;
            border: 1.5px solid var(--border);
            border-radius: 999px;
            background: #fff;
            font-family: inherit;
            font-size: .8rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, background .15s;
            white-space: nowrap;
        }

        .share-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #eff6ff;
        }

        .share-btn.copied {
            border-color: #22c55e;
            color: #22c55e;
            background: #f0fdf4;
        }

        .reset-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: #fef2f2;
        }

        /* ── Reset confirmation dialog ── */
        .dialog-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.35);
            backdrop-filter: blur(2px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .dialog-backdrop.open { display: flex; }

        .dialog {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem 1.75rem;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(15,23,42,.12);
            text-align: center;
        }
        .dialog h3 {
            margin: 0 0 .4rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .dialog p {
            margin: 0 0 1.2rem;
            font-size: .875rem;
            color: var(--muted);
        }
        .dialog-actions {
            display: flex;
            gap: .6rem;
            justify-content: center;
        }
        .dialog-actions button {
            flex: 1;
            padding: .45rem .9rem;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            font-size: .875rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color .15s, color .15s, background .15s;
            background: #fff;
            color: var(--text);
        }
        .dialog-actions .btn-cancel:hover {
            border-color: #94a3b8;
            background: #f8fafc;
        }
        .dialog-actions .btn-confirm {
            border-color: #ef4444;
            color: #ef4444;
        }
        .dialog-actions .btn-confirm:hover {
            background: #ef4444;
            color: #fff;
        }

        /* ── Cumulative time icon ── */
        .cumul-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
        }

        .cumul-icon {
            font-size: .85rem;
            line-height: 1;
            color: var(--muted);
            cursor: default;
            opacity: .45;
            transition: opacity .15s;
            user-select: none;
        }

        .cumul-wrap:hover .cumul-icon { opacity: 1; }

        .cumul-tooltip {
            position: absolute;
            right: calc(100% + 8px);
            top: 50%;
            transform: translateY(-50%);
            background: #0f172a;
            color: #fff;
            font-size: .75rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            padding: .28rem .6rem;
            border-radius: 6px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity .15s;
            z-index: 20;
        }

        .cumul-tooltip::after {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            border: 5px solid transparent;
            border-left-color: #0f172a;
        }

        .cumul-wrap:hover .cumul-tooltip { opacity: 1; }
        .cumul-wrap.no-data .cumul-icon  { opacity: .2; }

        /* ── Responsive ── */
        @media (max-width: 1600px) {
            main {
                max-width: 740px;
                padding: 1.25rem 1rem 1rem;
            }

            .scenario-cards {
                grid-template-columns: 1fr;
            }

            .add-scenario-wrap {
                padding: 1.25rem 0 3rem;
            }
        }

        @media (max-width: 1100px) and (min-width: 769px) {
            .dist-row {
                grid-template-columns: 80px 1fr 100px;
            }

            .pace-row {
                grid-template-columns: 80px 1fr 22px 100px;
            }

            .field-hint {
                padding-left: 80px;
            }

            .result-item {
                grid-template-columns: 80px 1fr 85px 22px;
            }
        }

        @media (max-width: 540px) {
            .dist-row {
                grid-template-columns: 80px 1fr 110px;
            }

            .pace-row {
                grid-template-columns: 80px 1fr 22px 110px;
            }

            .field-hint {
                padding-left: 80px;
            }

            .result-item {
                grid-template-columns: 80px 1fr 90px 22px;
            }
        }

        @media (max-width: 400px) {
            .pace-row {
                grid-template-columns: 1fr 22px 1fr;
                grid-template-rows: auto auto;
            }

            .pace-row .sport-label {
                grid-column: 1 / -1;
            }

            .transition-label {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>🏁 Tri Race Calculator</h1>
    <p>Plan your race time and target pace for every segment</p>
</header>

<main>
    <div id="scenarios-container"></div>
    <div class="add-scenario-wrap">
        <button id="add-scenario-btn" class="add-scenario-btn">＋ New scenario</button>
        <button id="duplicate-scenario-btn" class="duplicate-scenario-btn">&#10697; Duplicate scenario</button>
    </div>
</main>

<div class="dialog-backdrop" id="reset-dialog">
    <div class="dialog">
        <h3>Reset everything?</h3>
        <p>All distances, paces, and times will be cleared.</p>
        <div class="dialog-actions">
            <button class="btn-cancel" id="reset-cancel">Cancel</button>
            <button class="btn-confirm" id="reset-confirm">Reset</button>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
